name: Deploy backend (Cloudflare Worker)

# Publica a API (backend/) sempre que algo nela mudar. Aplica o schema do
# banco D1 (idempotente) e faz o deploy do Worker — tudo automático depois
# que os 2 secrets abaixo forem cadastrados uma única vez.
on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Aplicar schema do banco (D1)
        run: npx wrangler d1 execute elektrosys --remote --file=schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy do Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
